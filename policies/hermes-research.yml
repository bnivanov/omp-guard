schemaVersion: 1
name: hermes-research
description: Hermes research/marketing/librarian policy. Model APIs plus explicit search-provider APIs; no package registries or GitHub write.
workspace:
  allowedRoots:
    - "$HOME/AgentWork"
  deniedPaths:
    - "/Users/Shared"
    - "/Users/Shared/**"
    - "$HOME/Desktop"
    - "$HOME/Desktop/**"
    - "$HOME/Documents"
    - "$HOME/Documents/**"
    - "$HOME/Downloads"
    - "$HOME/Downloads/**"
    - "$HOME/Library/Mobile Documents"
    - "$HOME/Library/Mobile Documents/**"
credentialAndPrivatePaths:
  deny:
    - "**/.ssh"
    - "**/.ssh/**"
    - "**/.config"
    - "**/.config/**"
    - "**/.aws"
    - "**/.aws/**"
    - "**/.docker"
    - "**/.docker/**"
    - "**/.gnupg"
    - "**/.gnupg/**"
    - "**/.omp"
    - "**/.omp/**"
    - "**/.hermes"
    - "**/.hermes/**"
    - "**/.omp-guard-state"
    - "**/.omp-guard-state/**"
    - "**/.claude"
    - "**/.claude/**"
    - "**/.codex"
    - "**/.codex/**"
    - "**/Library/Keychains"
    - "**/Library/Keychains/**"
    - "**/Library/Application Support/Google/Chrome"
    - "**/Library/Application Support/Google/Chrome/**"
    - "**/Library/Application Support/Chromium"
    - "**/Library/Application Support/Chromium/**"
    - "**/Library/Safari"
    - "**/Library/Safari/**"
commands:
  allow:
    - "pwd"
    - "ls"
    - "cat"
    - "sed"
    - "awk"
    - "grep"
    - "find"
    - "git status"
    - "git diff"
    - "git log"
    - "git branch"
    - "git show"
    - "npm test"
    - "python -m pytest"
    - "pytest"
    - "hermes --version"
    - "hermes kanban"
  askBefore:
    - "git push"
    - "git commit"
    - "git reset"
    - "git clean"
    - "rm"
    - "mv"
    - "cp"
    - "chmod"
    - "chown"
    - "sudo"
    - "brew install"
    - "brew upgrade"
    - "npm install"
    - "pip install"
    - "python -m pip install"
    - "curl"
    - "wget"
    - "ssh"
    - "scp"
    - "rsync"
    - "launchctl"
    - "security"
    - "defaults write"
    - "lsof"
    - "nc"
    - "python -m http.server"
    - "hermes gateway"
    - "hermes cron"
  block:
    - "rm -rf /"
    - "rm -rf /*"
    - "sudo rm -rf /"
    - "sudo rm -rf /*"
    - "diskutil"
    - "pfctl"
    - "csrutil"
    - "spctl --master-disable"
    - "fdesetup"
    - "dscl"
    - "dseditgroup"
    - "systemsetup -setremotelogin on"
    - "launchctl bootstrap"
    - "launchctl enable"
    - "launchctl load"
    - "crontab"
    - "mkfs"
    - "dd if="
    - "docker run --privileged"
    - "-v /var/run/docker.sock"
    - "--mount type=bind,source=/Users/"
    - "--mount type=bind,source=/Users/Shared"
network:
  default: allowlisted
  allowedDomains:
    - "api.anthropic.com:443"
    - "api.openai.com:443"
    - "openrouter.ai:443"
    - "*.openrouter.ai:443"
    - "opencode.ai:443"
    - "*.opencode.ai:443"
    - "api.tavily.com:443"
    - "api.exa.ai:443"
    - "api.search.brave.com:443"
  askBefore:
    - "opening new listening servers"
    - "exposing ports beyond localhost"
    - "connecting to unknown package registries"
    - "downloading and executing remote scripts"
logging:
  launchLog: "$HOME/AgentWork/.omp-guard-logs/launch.log"
  commandLog: "$HOME/AgentWork/.omp-guard-logs/commands.log"
  hermesLaunchLog: "$HOME/AgentWork/.omp-guard-logs/hermes-launch.log"
