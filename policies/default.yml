schemaVersion: 1
name: default
description: Default omp-guard policy for the macOS Agent Lab work account.

workspace:
  allowedRoots:
    - "$HOME/AgentWork"
  deniedPaths:
    # OMP_GUARD_PERSONAL_HOME is configured per-install at setup time.
    - "/Users/Shared"
    - "/Users/Shared/**"
    - "$HOME/Desktop"
    - "$HOME/Desktop/**"
    - "$HOME/Documents"
    - "$HOME/Documents/**"
    - "$HOME/Downloads"
    - "$HOME/Downloads/**"
    - "$HOME/Library/Mobile Documents"
    - "$HOME/Library/Mobile Documents/**"

credentialAndPrivatePaths:
  deny:
    - "**/.ssh"
    - "**/.ssh/**"
    - "**/.config"
    - "**/.config/**"
    - "**/.aws"
    - "**/.aws/**"
    - "**/.docker"
    - "**/.docker/**"
    - "**/.gnupg"
    - "**/.gnupg/**"
    - "**/.omp"
    - "**/.omp/**"
    - "**/.omp-guard-state"
    - "**/.omp-guard-state/**"
    - "**/.claude"
    - "**/.claude/**"
    - "**/.codex"
    - "**/.codex/**"
    - "**/Library/Keychains"
    - "**/Library/Keychains/**"
    - "**/Library/Application Support/Google/Chrome"
    - "**/Library/Application Support/Google/Chrome/**"
    - "**/Library/Application Support/Chromium"
    - "**/Library/Application Support/Chromium/**"
    - "**/Library/Safari"
    - "**/Library/Safari/**"

commands:
  allow:
    - "pwd"
    - "ls"
    - "cat"
    - "sed"
    - "awk"
    - "grep"
    - "find"
    - "git status"
    - "git diff"
    - "git log"
    - "git branch"
    - "git show"
    - "npm test"
    - "python -m pytest"
    - "pytest"

  askBefore:
    - "git push"
    - "git commit"
    - "git reset"
    - "git clean"
    - "rm"
    - "mv"
    - "cp"
    - "chmod"
    - "chown"
    - "sudo"
    - "brew install"
    - "brew upgrade"
    - "npm install"
    - "pip install"
    - "python -m pip install"
    - "curl"
    - "wget"
    - "ssh"
    - "scp"
    - "rsync"
    - "launchctl"
    - "security"
    - "defaults write"
    - "lsof"
    - "nc"
    - "python -m http.server"

  block:
    - "rm -rf /"
    - "rm -rf /*"
    - "sudo rm -rf /"
    - "sudo rm -rf /*"
    - "diskutil"
    - "pfctl"
    - "csrutil"
    - "spctl --master-disable"
    - "fdesetup"
    - "dscl"
    - "dseditgroup"
    - "systemsetup -setremotelogin on"
    - "launchctl bootstrap"
    - "launchctl enable"
    - "launchctl load"
    - "crontab"
    - "mkfs"
    - "dd if="
    - "docker run --privileged"
    - "-v /var/run/docker.sock"
    - "--mount type=bind,source=/Users/"
    - "--mount type=bind,source=/Users/Shared"
    - "-v /Users/"

network:
  default: allowlisted
  # Tier 0 (light) egress proxy allowlist. Deliberately MINIMAL: model APIs
  # only. GitHub/npm/PyPI are useful but are also easy exfiltration channels
  # (issues, gists, uploads), so they are OPT-IN, not always-on. Uncomment a
  # named group below only for a session that needs it.
  allowedDomains:
    # --- model providers (default) ---
    - "api.anthropic.com:443"
    - "api.openai.com:443"
    - "openrouter.ai:443"
    - "*.openrouter.ai:443"
    # --- group: docs (opt-in) ---
    # - "*.context7.com:443"
    # --- group: github (opt-in; exfil-capable) ---
    # - "github.com:443"
    # - "raw.githubusercontent.com:443"
    # - "*.githubusercontent.com:443"
    # --- group: package-install (opt-in; exfil-capable) ---
    # - "registry.npmjs.org:443"
    # - "pypi.org:443"
    # - "files.pythonhosted.org:443"
  askBefore:
    - "opening new listening servers"
    - "exposing ports beyond localhost"
    - "connecting to unknown package registries"
    - "downloading and executing remote scripts"

logging:
  launchLog: "$HOME/AgentWork/.omp-guard-logs/launch.log"
  commandLog: "$HOME/AgentWork/.omp-guard-logs/commands.log"
