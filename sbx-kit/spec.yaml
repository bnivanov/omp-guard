schemaVersion: "1"
kind: sandbox
name: omp
displayName: OMP
description: The omp coding agent (oh-my-pi) — runs inside a Docker sbx sandbox.

sandbox:
  image: "omp-sbx:latest"
  aiFilename: AGENTS.md
  entrypoint:
    run: [omp]
commands:
  startup:
    - command:
        - "bash"
        - "-c"
        - |
          # Symlink guard-scoped OMP state mount to /home/agent/.omp.
          # The launcher mounts $HOME/AgentWork/.omp-guard-state, not the host's normal ~/.omp.
          OMP_HOST=$(mount | grep 'type virtiofs' | grep '/.omp-guard-state ' | sed 's/.* on //; s/ type.*//' | head -1)
          [ -n "$OMP_HOST" ] && ln -sf "$OMP_HOST" "$HOME/.omp" || true
          # GitHub auth is intentionally not forwarded by default.
          # Symlink primary workspace mount to /home/agent/workspace
          # sbx mounts workspaces at their host path; we need them at the
          # template's WORKDIR (/home/agent/workspace) for omp to find them.
          WS_HOST=$(mount | grep 'type virtiofs' | grep -v '\.omp' | grep -v resolv | sed 's/.* on //; s/ type.*//' | head -1)
          if [ -n "$WS_HOST" ] && [ "$WS_HOST" != "/home/agent/workspace" ]; then
            rm -rf /home/agent/workspace
            ln -sf "$WS_HOST" /home/agent/workspace
          fi
      user: "1000"
      description: Symlink guard-scoped OMP state and workspace host mounts

# ── Network ──────────────────────────────────────────────────────────────────
# omp needs to reach model API providers. The sbx proxy injects API keys from
# the host secret store; inside the sandbox only a placeholder is visible.
network:
  allowedDomains:
    # Model providers — add the ones you use
    - "api.anthropic.com:443"
    - "api.openai.com:443"
    - "openrouter.ai:443"
    - "*.openrouter.ai:443"
    # omp release downloads (native addon self-extraction, updates)
    - "github.com:443"
    - "*.githubusercontent.com:443"
    - "raw.githubusercontent.com:443"
    # Package registries (npm, pip, cargo)
    - "registry.npmjs.org:443"
    - "pypi.org:443"
    - "files.pythonhosted.org:443"
    # Local model servers (host.docker.internal resolves to host)
    - "host.docker.internal:*"
    # AI/doc context
    - "*.context7.com:443"
    - "code.visualstudio.com:443"
    - "*.cloudflare.com:443"

# ── Environment ──────────────────────────────────────────────────────────────
# PI_CONFIG_DIR=.omp makes omp use ~/.omp (the symlink to the host mount).
environment:
  variables:
    PI_CONFIG_DIR: ".omp"
    HOME: "/home/agent"

# ── Agent context (appended to AGENTS.md) ────────────────────────────────────
agentContext: |
  ## Sandbox environment

  You are running inside a Docker sbx sandbox (microVM). The workspace is
  mounted at `/home/agent/workspace`. Your configs (`~/.omp`) are bind-mounted
  from the host — agent.db, managed-skills, memories, and sessions persist
  across sandbox restarts.

  GitHub authentication is not forwarded by default. Use a separate
  agent-specific GitHub credential if this sandbox needs repository write access.

  `sudo` is passwordless; use it for system package installs.

  The omp `browser` tool (Puppeteer/Chromium) cannot spawn inside this microVM
  (ENOEXEC on the bundled chrome-linux64 binary). For browser automation use the
  installed `agent-browser` CLI instead (`agent-browser open <url>`, then
  `snapshot`, `click @eN`, `screenshot`, etc.). It uses the system
  chromium-browser (`AGENT_BROWSER_EXECUTABLE_PATH=/usr/bin/chromium-browser`).
  For fetching static web content (articles, docs, JSON, PDFs) prefer the `read`
  tool on a URL — no browser needed.
